name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    name: ${{ matrix.component }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: calculator
            test_path: tests/calculator

          - component: time-converter
            test_path: tests/time_converter

          - component: crypto-converter
            test_path: tests/crypto_converter

          - component: crypto-calculator
            test_path: tests/crypto_calculator

          - component: settings
            test_path: tests/settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run ${{ matrix.component }} tests
        run: python -m pytest "${{ matrix.test_path }}"
